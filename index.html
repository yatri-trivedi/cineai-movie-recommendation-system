<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineAI - Movie Recommendation System</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23134e4a'/><text y='.9em' font-size='70' x='12'>🎬</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;
      --surface:#161b22;
      --surface2:#1c2128;
      --surface3:#21262d;
      --border:#30363d;
      --teal:#2dd4bf;
      --teal-dark:#0f766e;
      --teal-dim:rgba(45,212,191,0.12);
      --teal-glow:rgba(45,212,191,0.06);
      --white:#e6edf3;
      --muted:#8b949e;
      --text:#e6edf3;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    /* HEADER */
    header{
      position:sticky;top:0;z-index:100;
      background:rgba(13,17,23,0.96);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:0 2rem;height:60px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .logo{
      display:flex;align-items:center;gap:10px;
      font-family:'Space Grotesk',sans-serif;
      font-size:1.4rem;font-weight:700;letter-spacing:-0.5px;
    }
    .logo-icon{
      width:32px;height:32px;background:var(--teal-dark);
      border-radius:8px;display:flex;align-items:center;justify-content:center;
      font-size:1rem;
    }
    .logo-text{color:var(--white)}
    .logo-text span{color:var(--teal)}
    .logo-tag{
      font-size:0.6rem;font-family:'Inter',sans-serif;font-weight:500;
      background:var(--teal-dim);color:var(--teal);
      border:1px solid rgba(45,212,191,0.25);
      border-radius:4px;padding:2px 6px;letter-spacing:1px;
    }
    .stats-bar{display:flex;gap:1.5rem;font-size:0.75rem;color:var(--muted)}
    .stats-bar b{color:var(--teal)}
    /* HERO */
    .hero{
      padding:3rem 2rem 2.5rem;text-align:center;
      border-bottom:1px solid var(--border);
      background:linear-gradient(180deg,rgba(45,212,191,0.04) 0%,transparent 100%);
    }
    .hero-logo{
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(3rem,8vw,6rem);
      font-weight:700;letter-spacing:-2px;line-height:1;
      margin-bottom:0.75rem;
    }
    .hero-logo span{color:var(--teal)}
    .hero-sub{
      font-size:1rem;color:var(--muted);
      font-weight:400;margin-bottom:1.5rem;
    }
    .hero-sub b{color:var(--white);font-weight:500}

    /* CONTROLS */
    .controls{
      display:flex;flex-wrap:wrap;gap:0.75rem;
      padding:1rem 2rem;
      background:var(--surface);
      border-bottom:1px solid var(--border);
      position:sticky;top:60px;z-index:90;
    }
    .search-wrap{position:relative;flex:1;min-width:220px}
    .search-wrap input{
      width:100%;padding:0.6rem 1rem 0.6rem 2.4rem;
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:8px;color:var(--text);
      font-size:0.875rem;font-family:inherit;
      outline:none;transition:border 0.2s,box-shadow 0.2s;
    }
    .search-wrap input:focus{
      border-color:var(--teal);
      box-shadow:0 0 0 3px rgba(45,212,191,0.1);
    }
    .search-icon{
      position:absolute;left:0.75rem;top:50%;
      transform:translateY(-50%);color:var(--muted);font-size:0.85rem;
    }
    .search-dropdown{
      position:absolute;top:calc(100% + 4px);left:0;right:0;
      background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;max-height:300px;overflow-y:auto;z-index:200;display:none;
      box-shadow:0 8px 24px rgba(0,0,0,0.4);
    }
    .search-dropdown.show{display:block}
    .dropdown-item{
      padding:0.6rem 1rem;font-size:0.83rem;cursor:pointer;
      display:flex;justify-content:space-between;align-items:center;
      border-bottom:1px solid var(--border);transition:background 0.15s;
    }
    .dropdown-item:last-child{border-bottom:none}
    .dropdown-item:hover{background:var(--surface3)}
    .d-meta{display:flex;gap:0.75rem;align-items:center}
    .d-rating{color:var(--teal);font-size:0.75rem;font-weight:500}
    .d-year{color:var(--muted);font-size:0.72rem}
    select{
      padding:0.6rem 1rem;background:var(--surface2);
      border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-family:inherit;font-size:0.83rem;cursor:pointer;outline:none;
      transition:border 0.2s;
    }
    select:focus{border-color:var(--teal)}

    /* CONTAINER */
    .container{max-width:1400px;margin:0 auto;padding:1.75rem 2rem}

    /* GENRE PILLS */
    .genre-pills{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.25rem}
    .pill{
      padding:0.3rem 0.85rem;border-radius:999px;font-size:0.75rem;
      border:1px solid var(--border);cursor:pointer;transition:all 0.2s;
      background:transparent;color:var(--muted);font-family:inherit;
    }
    .pill:hover{border-color:var(--teal);color:var(--teal)}
    .pill.active{
      background:var(--teal-dark);color:#fff;
      border-color:var(--teal-dark);font-weight:600;
    }
    /* RESULTS INFO */
    .results-info{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:1rem;font-size:0.8rem;color:var(--muted);
    }
    .results-info b{color:var(--white)}

    /* GRID */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1rem}

    /* CARD */
    .card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.25s;
    }
    .card:hover{
      transform:translateY(-3px);
      border-color:var(--teal-dark);
      box-shadow:0 6px 24px rgba(45,212,191,0.08);
    }
    .card-poster{height:240px;background:var(--surface2);overflow:hidden;position:relative}
    .card-poster img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
    .card:hover .card-poster img{transform:scale(1.04)}
    .no-poster{
      width:100%;height:100%;display:flex;flex-direction:column;
      align-items:center;justify-content:center;color:var(--muted);font-size:2.5rem;
    }
    .no-poster span{font-size:0.65rem;margin-top:0.4rem;color:var(--muted)}
    .poster-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(13,17,23,0.9) 0%,transparent 50%);
    }
    .poster-rating{
      position:absolute;bottom:0.5rem;left:0.6rem;
      display:flex;align-items:center;gap:0.25rem;font-size:0.78rem;
    }
    .poster-rating .star{color:var(--teal)}
    .poster-rating .val{color:#fff;font-weight:600}
    .poster-rating .cnt{color:rgba(255,255,255,0.45);font-size:0.68rem}
    .card-body{padding:0.65rem 0.7rem}
    .card-title{
      font-size:0.8rem;font-weight:500;line-height:1.3;margin-bottom:0.35rem;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .card-genres{display:flex;flex-wrap:wrap;gap:0.25rem}
    .genre-tag{
      font-size:0.62rem;padding:0.12rem 0.4rem;border-radius:4px;
      background:var(--surface3);color:var(--muted);
    }

    /* PAGINATION */
    .pagination{display:flex;gap:0.4rem;justify-content:center;margin-top:2rem;flex-wrap:wrap}
    .page-btn{
      padding:0.45rem 0.85rem;border-radius:7px;border:1px solid var(--border);
      background:var(--surface);color:var(--muted);cursor:pointer;
      font-family:inherit;font-size:0.8rem;transition:all 0.2s;
    }
    .page-btn:hover{border-color:var(--teal);color:var(--teal)}
    .page-btn.active{
      background:var(--teal-dark);color:#fff;
      border-color:var(--teal-dark);font-weight:600;
    }
    .page-btn:disabled{opacity:0.3;cursor:not-allowed}

    /* MODAL */
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,0.85);
      backdrop-filter:blur(8px);z-index:999;
      display:flex;align-items:center;justify-content:center;
      padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .modal-backdrop.show{opacity:1;pointer-events:all}
    .modal{
      background:var(--surface);border:1px solid var(--border);
      border-radius:14px;width:100%;max-width:780px;
      max-height:92vh;overflow-y:auto;
      transform:translateY(20px);transition:transform 0.25s;position:relative;
    }
    .modal-backdrop.show .modal{transform:translateY(0)}
    .modal-top{display:flex}
    .modal-poster-wrap{width:240px;flex-shrink:0}
    .modal-poster-wrap img{
      width:100%;border-radius:14px 0 0 0;
      display:block;object-fit:cover;max-height:360px;
    }
    .no-poster-lg{
      width:100%;min-height:360px;display:flex;
      align-items:center;justify-content:center;
      font-size:5rem;background:var(--surface2);border-radius:14px 0 0 0;
    }
    .modal-info{padding:1.75rem;flex:1}
    .modal-close{
      position:absolute;top:0.85rem;right:0.85rem;
      background:var(--surface3);border:1px solid var(--border);
      color:var(--muted);width:30px;height:30px;border-radius:50%;
      cursor:pointer;font-size:0.85rem;display:flex;
      align-items:center;justify-content:center;z-index:10;transition:all 0.2s;
    }
    .modal-close:hover{color:var(--white);border-color:var(--muted)}
    .modal-title{
      font-family:'Space Grotesk',sans-serif;
      font-size:1.7rem;font-weight:700;letter-spacing:-0.5px;
      line-height:1.1;margin-bottom:0.2rem;color:var(--white);
    }
    .modal-year{color:var(--teal);font-size:0.85rem;font-weight:500;margin-bottom:1rem}
    .modal-rating{
      display:flex;align-items:center;gap:1rem;
      margin-bottom:1.25rem;padding-bottom:1.25rem;
      border-bottom:1px solid var(--border);
    }
    .big-star{font-size:1.8rem;color:var(--teal)}
    .rating-val{font-size:1.75rem;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--white)}
    .rating-cnt{font-size:0.75rem;color:var(--muted)}
    .modal-section{margin-bottom:0.9rem}
    .modal-label{
      font-size:0.65rem;color:var(--muted);
      text-transform:uppercase;letter-spacing:1.5px;
      margin-bottom:0.45rem;font-weight:600;
    }
    .modal-genre-tag{
      padding:0.28rem 0.7rem;border-radius:6px;font-size:0.75rem;
      background:var(--surface2);border:1px solid var(--border);
      display:inline-block;margin:0.18rem 0.18rem 0 0;
    }
    .tag-chip{
      padding:0.22rem 0.55rem;border-radius:4px;font-size:0.7rem;
      background:var(--teal-dim);color:var(--teal);
      border:1px solid rgba(45,212,191,0.2);
      display:inline-block;margin:0.12rem 0.12rem 0 0;
    }
    .tmdb-link{
      display:inline-flex;align-items:center;gap:0.4rem;
      color:var(--teal);text-decoration:none;font-size:0.8rem;margin-top:0.75rem;
    }
    .tmdb-link:hover{text-decoration:underline}

    /* RECOMMENDATIONS SECTION */
    .modal-recs{
      padding:1.5rem;
      border-top:1px solid var(--border);
      background:var(--teal-glow);
    }
    .recs-header{
      display:flex;align-items:center;gap:0.75rem;margin-bottom:1.1rem;
    }
    .recs-icon{
      width:32px;height:32px;background:var(--teal-dark);
      border-radius:8px;display:flex;align-items:center;
      justify-content:center;font-size:0.9rem;flex-shrink:0;
    }
    .recs-title{
      font-family:'Space Grotesk',sans-serif;
      font-size:1rem;font-weight:600;color:var(--white);
    }
    .recs-sub{font-size:0.72rem;color:var(--muted);margin-top:1px}
    .recs-badge{
      margin-left:auto;font-size:0.62rem;padding:0.18rem 0.55rem;
      border-radius:20px;
      background:var(--teal-dim);
      color:var(--teal);border:1px solid rgba(45,212,191,0.25);
      letter-spacing:0.5px;font-weight:600;white-space:nowrap;
    }
    .recs-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(115px,1fr));
      gap:0.75rem;
    }
    .rec-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:8px;overflow:hidden;cursor:pointer;transition:all 0.2s;
    }
    .rec-card:hover{
      border-color:var(--teal-dark);
      transform:translateY(-2px);
      box-shadow:0 4px 16px rgba(45,212,191,0.1);
    }
    .rec-poster{height:145px;background:var(--surface2);overflow:hidden;position:relative}
    .rec-poster img{width:100%;height:100%;object-fit:cover}
    .rec-no-poster{
      width:100%;height:100%;display:flex;
      align-items:center;justify-content:center;font-size:1.8rem;
    }
    .rec-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(13,17,23,0.8),transparent);
    }
    .rec-rating{
      position:absolute;bottom:0.3rem;left:0.4rem;
      font-size:0.68rem;color:var(--teal);font-weight:600;
    }
    .rec-body{padding:0.5rem 0.55rem}
    .rec-title{
      font-size:0.7rem;line-height:1.25;color:var(--white);
      display:-webkit-box;-webkit-line-clamp:2;
      -webkit-box-orient:vertical;overflow:hidden;
    }

    /* SPINNER */
    .spinner{display:flex;justify-content:center;align-items:center;padding:4rem}
    .spin{
      width:36px;height:36px;
      border:2px solid var(--border);
      border-top-color:var(--teal);
      border-radius:50%;animation:spin 0.8s linear infinite;
    }
    .rec-spinner{display:flex;justify-content:center;padding:1.5rem}
    .rec-spin{
      width:20px;height:20px;
      border:2px solid var(--border);
      border-top-color:var(--teal);
      border-radius:50%;animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--surface)}
    ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

    @media(max-width:640px){
      .modal-top{flex-direction:column}
      .modal-poster-wrap{width:100%}
      .modal-poster-wrap img,.no-poster-lg{border-radius:14px 14px 0 0;max-height:240px}
      .stats-bar{display:none}
      .recs-grid{grid-template-columns:repeat(3,1fr)}
      .hero-logo{font-size:2.8rem}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎬</div>
    <div class="logo-text">Cine<span>AI</span></div>

  </div>
  <div class="stats-bar" id="statsBar">Loading...</div>
</header>

<div class="hero">
  <div class="hero-logo">Cine<span>AI</span></div>
  <div class="hero-sub">
    <b>Movie Recommendation System</b> &nbsp;·&nbsp;
    9,742 films &nbsp;
  </div>
</div>
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search movies by title..." autocomplete="off"/>
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <select id="sortSelect">
    <option value="numRatings">Most Rated</option>
    <option value="avgRating">Top Rated</option>
    <option value="year">Newest First</option>
  </select>
  <select id="minRatings">
    <option value="0">All Movies</option>
    <option value="10">10+ Ratings</option>
    <option value="50">50+ Ratings</option>
    <option value="100">100+ Ratings</option>
  </select>
</div>
<div class="container">
  <div class="genre-pills" id="genrePills">
    <span class="pill active" data-genre="">All Genres</span>
    {% for g in genres %}
    <span class="pill" data-genre="{{ g }}">{{ g }}</span>
    {% endfor %}
  </div>
  <div class="results-info" id="resultsInfo"></div>
  <div id="grid" class="grid"></div>
  <div id="spinner" class="spinner"><div class="spin"></div></div>
  <div class="pagination" id="pagination"></div>
</div>
<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">&#x2715;</button>
    <div class="modal-top">
      <div class="modal-poster-wrap" id="modalPoster"></div>
      <div class="modal-info" id="modalInfo"></div>
    </div>
    <!-- RECOMMENDED FOR YOU SECTION -->
    <div class="modal-recs" id="modalRecs" style="display:none">
      <div class="recs-header">
        <div class="recs-icon">🤖</div>
        <div>
          <div class="recs-title">Recommended For You</div>
          <div class="recs-sub">Based on this movie</div>
        </div>
        <span class="recs-badge">AI PICKS</span>
      </div>
      <div id="recsGrid" class="recs-grid"></div>
    </div>
  </div>
</div>
<script>
const TMDB_KEY = "ca53af58900b285674d07dca69e7bf2e";
const cache = {};
let state = {query:"",genre:"",sort:"numRatings",minRatings:0,page:1};
const posterQueue = [];
let activeRequests = 0;
const MAX_CONCURRENT = 4;
async function getPoster(tmdbId, large=false){
  if(!tmdbId || tmdbId==="nan" || tmdbId==="") return null;
  const k = tmdbId+(large?"_lg":"");
  if(cache[k]) return cache[k];
  return new Promise((resolve)=>{
    posterQueue.push({tmdbId,large,k,resolve});
    processQueue();
  });
}
async function processQueue(){
  if(activeRequests>=MAX_CONCURRENT || posterQueue.length===0) return;
  activeRequests++;
  const {tmdbId,large,k,resolve} = posterQueue.shift();
  try{
    const size = large?"w400":"w300";
    const r = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_KEY}`);
    const d = await r.json();
    if(d.poster_path){
      const url = `https://image.tmdb.org/t/p/${size}${d.poster_path}`;
      cache[k]=url; resolve(url);
    } else { resolve(null); }
  }catch(e){ resolve(null); }
  activeRequests--;
  processQueue();
}
fetch("/api/stats").then(r=>r.json()).then(d=>{
  document.getElementById("statsBar").innerHTML=
    `<span>🎬 <b>${d.totalMovies.toLocaleString()}</b> Movies</span>
     <span>⭐ <b>${d.totalRatings.toLocaleString()}</b> Ratings</span>
     <span>👤 <b>${d.totalUsers.toLocaleString()}</b> Users</span>
     <span>Avg: <b>${d.avgRating}</b></span>`;
});
async function fetchMovies(){
  showSpinner(true);
  const p = new URLSearchParams({q:state.query,genre:state.genre,sort:state.sort,min_ratings:state.minRatings,page:state.page,per_page:20});
  const res = await fetch(`/api/movies?${p}`);
  const data = await res.json();
  showSpinner(false);
  renderGrid(data.movies);
  renderPagination(data.page,data.pages,data.total);
  document.getElementById("resultsInfo").innerHTML=
    `Showing <b>${((data.page-1)*20)+1}&ndash;${Math.min(data.page*20,data.total)}</b> of <b>${data.total.toLocaleString()}</b> movies`;
}
function renderGrid(movies){
  const g = document.getElementById("grid");
  if(!movies.length){
    g.innerHTML=`<div style="color:var(--muted);padding:3rem;grid-column:1/-1;text-align:center">No movies found</div>`;
    return;
  }
  g.innerHTML = movies.map(m=>`
    <div class="card" onclick="openModal(${m.id})">
      <div class="card-poster" id="cp-${m.id}">
        <div class="no-poster">🎬<span>${m.year}</span></div>
        <div class="poster-overlay"></div>
        <div class="poster-rating">
          <span class="star">★</span>
          <span class="val">${m.avgRating||"N/A"}</span>
          <span class="cnt">(${m.numRatings})</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-genres">${m.genres.slice(0,2).map(g=>`<span class="genre-tag">${g}</span>`).join("")}</div>
      </div>
    </div>`).join("");
  movies.forEach((m,i)=>{
    if(!m.tmdbId||m.tmdbId==="nan"||m.tmdbId==="") return;
    setTimeout(()=>loadCardPoster(m.tmdbId,m.id,m.avgRating,m.numRatings),i*120);
  });
}

async function loadCardPoster(tmdbId,id,rating,cnt){
  const url = await getPoster(tmdbId);
  if(!url) return;
  const el = document.getElementById(`cp-${id}`);
  if(!el) return;
  el.innerHTML=`<img src="${url}" alt="" loading="lazy"/><div class="poster-overlay"></div><div class="poster-rating"><span class="star">★</span><span class="val">${rating||"N/A"}</span><span class="cnt">(${cnt})</span></div>`;
}

async function openModal(movieId){
  document.getElementById("modalBackdrop").classList.add("show");
  document.getElementById("modalRecs").style.display="none";
  document.getElementById("modalPoster").innerHTML=`<div class="no-poster-lg">⏳</div>`;
  document.getElementById("modalInfo").innerHTML=`<div style="color:var(--muted);padding:2rem">Loading...</div>`;

  const res = await fetch(`/api/movie/${movieId}`);
  const m = await res.json();

  const [url] = await Promise.all([
    getPoster(m.tmdbId,true),
    loadRecs(movieId)
  ]);

  document.getElementById("modalPoster").innerHTML = url
    ?`<img src="${url}" alt="${m.title}"/>`
    :`<div class="no-poster-lg">🎬</div>`;

  document.getElementById("modalInfo").innerHTML=`
    <div class="modal-title">${m.title.replace(/\s*\(\d{4}\)/,"")}</div>
    <div class="modal-year">📅 ${m.year}</div>
    <div class="modal-rating">
      <span class="big-star">★</span>
      <div>
        <div class="rating-val">${m.avgRating||"N/A"}</div>
        <div class="rating-cnt">${m.numRatings.toLocaleString()} ratings</div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Genres</div>
      <div>${m.genres.map(g=>`<span class="modal-genre-tag">${g}</span>`).join("")}</div>
    </div>
    ${m.tags.length?`<div class="modal-section"><div class="modal-label">User Tags</div><div>${m.tags.map(t=>`<span class="tag-chip">#${t}</span>`).join("")}</div></div>`:""}
    ${m.tmdbId?`<a class="tmdb-link" href="https://www.themoviedb.org/movie/${m.tmdbId}" target="_blank">🔗 View on TMDB</a>`:""}`;
}

async function loadRecs(movieId){
  const sec = document.getElementById("modalRecs");
  const grid = document.getElementById("recsGrid");
  sec.style.display="block";
  grid.innerHTML=`<div class="rec-spinner"><div class="rec-spin"></div></div>`;

  const res = await fetch(`/api/recommend/${movieId}`);
  const recs = await res.json();

  if(!recs.length){
    grid.innerHTML=`<div style="color:var(--muted);font-size:0.8rem;padding:0.5rem">No recommendations found.</div>`;
    return;
  }

  grid.innerHTML = recs.map(m=>`
    <div class="rec-card" onclick="openModal(${m.id})">
      <div class="rec-poster" id="rp-${m.id}">
        <div class="rec-no-poster">🎬</div>
        <div class="rec-overlay"></div>
        <div class="rec-rating">★ ${m.avgRating}</div>
      </div>
      <div class="rec-body"><div class="rec-title">${m.title}</div></div>
    </div>`).join("");

  recs.forEach((m,i)=>{
    if(!m.tmdbId||m.tmdbId==="nan"||m.tmdbId==="") return;
    setTimeout(()=>loadRecPoster(m.tmdbId,m.id,m.avgRating),i*180);
  });
}

async function loadRecPoster(tmdbId,id,rating){
  if(!tmdbId||tmdbId==="nan"||tmdbId==="") return;
  const url = await getPoster(tmdbId);
  if(!url) return;
  const el = document.getElementById(`rp-${id}`);
  if(!el) return;
  el.innerHTML=`<img src="${url}" alt="" loading="lazy"/><div class="rec-overlay"></div><div class="rec-rating">★ ${rating}</div>`;
}
document.getElementById("modalClose").onclick=()=>document.getElementById("modalBackdrop").classList.remove("show");
document.getElementById("modalBackdrop").onclick=e=>{if(e.target===e.currentTarget)document.getElementById("modalBackdrop").classList.remove("show");};
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("modalBackdrop").classList.remove("show");});
let timer;
const si=document.getElementById("searchInput");
const sd=document.getElementById("searchDropdown");
si.addEventListener("input",function(){
  clearTimeout(timer);
  const q=this.value.trim();
  if(q.length>=2){
    fetch(`/api/movies?q=${encodeURIComponent(q)}&per_page=8&sort=numRatings`).then(r=>r.json()).then(data=>{
      if(!data.movies.length){sd.classList.remove("show");return;}
      sd.innerHTML=data.movies.map(m=>`
        <div class="dropdown-item" onclick="pickMovie(${m.id},'${m.title.replace(/'/g,"\\'")}')">
          <span>${m.title}</span>
          <span class="d-meta"><span class="d-year">${m.year}</span><span class="d-rating">★ ${m.avgRating}</span></span>
        </div>`).join("");
      sd.classList.add("show");
    });
  } else { sd.classList.remove("show"); }
  state.query=q; state.page=1;
  timer=setTimeout(fetchMovies,400);
});
function pickMovie(id,title){si.value=title;sd.classList.remove("show");state.query=title;state.page=1;fetchMovies();openModal(id);}
document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap"))sd.classList.remove("show");});
document.getElementById("genrePills").addEventListener("click",e=>{
  if(!e.target.classList.contains("pill")) return;
  document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
  e.target.classList.add("active");
  state.genre=e.target.dataset.genre; state.page=1; fetchMovies();
});
document.getElementById("sortSelect").addEventListener("change",function(){state.sort=this.value;state.page=1;fetchMovies();});
document.getElementById("minRatings").addEventListener("change",function(){state.minRatings=parseInt(this.value);state.page=1;fetchMovies();});
function renderPagination(page,pages,total){
  if(pages<=1){document.getElementById("pagination").innerHTML="";return;}
  let b=`<button class="page-btn" onclick="goPage(${page-1})" ${page===1?"disabled":""}>&#8592; Prev</button>`;
  let s=Math.max(1,page-2),e=Math.min(pages,page+2);
  if(s>1) b+=`<button class="page-btn" onclick="goPage(1)">1</button>${s>2?'<span style="color:var(--muted);padding:0 4px">&#8230;</span>':""}`;
  for(let i=s;i<=e;i++) b+=`<button class="page-btn ${i===page?"active":""}" onclick="goPage(${i})">${i}</button>`;
  if(e<pages) b+=`${e<pages-1?'<span style="color:var(--muted);padding:0 4px">&#8230;</span>':""}<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  b+=`<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?"disabled":""}>Next &#8594;</button>`;
  document.getElementById("pagination").innerHTML=b;
}
function goPage(p){state.page=p;fetchMovies();window.scrollTo({top:250,behavior:"smooth"});}
function showSpinner(v){document.getElementById("spinner").style.display=v?"flex":"none";document.getElementById("grid").style.display=v?"none":"grid";}
fetchMovies();
</script>
</body>
</html>
